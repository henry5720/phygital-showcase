<div id="ar-v5-scanning-overlay" class="hidden">
  <div class="inner">
    <img src="/assets/web-ar/card.png" />
    <div class="scanline"></div>
  </div>
</div>

<a-scene
  loading-screen="enabled: false"
  mindar-image="imageTargetSrc: /assets/web-ar/card.mind; showStats: false; uiScanning: #ar-v5-scanning-overlay; filterMinCF:0.0001; filterBeta: 0.001;"
  color-space="sRGB"
  renderer="colorManagement: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  reflection
>
  <a-assets>
    <!-- <img id="card" src="/assets/web-ar/card.png" /> -->
    <img id="icon-web" src="/assets/web-ar/icons/web.png" />
    <img id="icon-email" src="/assets/web-ar/icons/email.png" />
    <img id="icon-profile" src="/assets/web-ar/icons/profile.png" />
    <img id="icon-location" src="/assets/web-ar/icons/location.png" />
    <img id="icon-left" src="/assets/web-ar/icons/left.png" />
    <img id="icon-right" src="/assets/web-ar/icons/right.png" />
    <img
      id="paintandquest-preview"
      src="/assets/web-ar/portfolio/paintandquest-preview.png"
    />
    <video
      id="paintandquest-video-mp4"
      loop="true"
      playsinline
      webkit-playsinline
      src="/assets/web-ar/portfolio/paintandquest.mp4"
    ></video>
    <video
      id="paintandquest-video-webm"
      loop="true"
      playsinline
      webkit-playsinline
      src="/assets/web-ar/portfolio/paintandquest.webm"
    ></video>
    <img
      id="coffeemachine-preview"
      src="/assets/web-ar/portfolio/coffeemachine-preview.png"
    />
    <img id="peak-preview" src="/assets/web-ar/portfolio/peak-preview.png" />
    <a-asset-item id="avatarModel" src="/assets/fizzt/test.glb"></a-asset-item>
  </a-assets>

  <a-camera
    position="0 0 0"
    look-controls="enabled: false"
    cursor="fuse: false; rayOrigin: mouse;"
    raycaster="far: 10000; objects: .clickable"
  ></a-camera>

  <a-entity id="ar-v5-target" mindar-image-target="targetIndex: 0">
    <a-plane
      src="#card"
      position="0 0 0"
      height="0.552"
      width="1"
      rotation="0 0 0"
    ></a-plane>

    <a-entity visible="false" id="portfolio-panel" position="0 0 -0.01">
      <a-text
        value="Portfolio"
        color="black"
        align="center"
        width="2"
        position="0 0.4 0"
      ></a-text>
      <a-entity id="portfolio-item0">
        <a-video
          id="paintandquest-video-link"
          webkit-playsinline
          playsinline
          width="1"
          height="0.552"
          position="0 0 0"
        ></a-video>
        <a-image
          id="paintandquest-preview-button"
          class="clickable"
          src="#paintandquest-preview"
          alpha-test="0.5"
          position="0 0 0"
          height="0.552"
          width="1"
        ></a-image>
      </a-entity>
      <a-entity id="portfolio-item1" visible="false">
        <a-image
          class="clickable"
          src="#coffeemachine-preview"
          alpha-test="0.5"
          position="0 0 0"
          height="0.552"
          width="1"
        ></a-image>
      </a-entity>
      <a-entity id="portfolio-item2" visible="false">
        <a-image
          class="clickable"
          src="#peak-preview"
          alpha-test="0.5"
          position="0 0 0"
          height="0.552"
          width="1"
        ></a-image>
      </a-entity>
      <a-image
        visible="false"
        id="portfolio-left-button"
        class="clickable"
        src="#icon-left"
        position="-0.7 0 0"
        height="0.15"
        width="0.15"
      ></a-image>
      <a-image
        visible="false"
        id="portfolio-right-button"
        class="clickable"
        src="#icon-right"
        position="0.7 0 0"
        height="0.15"
        width="0.15"
      ></a-image>
    </a-entity>

    <a-gltf-model
      id="avatar"
      rotation="0 0 0"
      position="0 -0.25 -0.3"
      scale="0.004 0.004 0.004"
      src="#avatarModel"
    ></a-gltf-model>

    <a-image
      visible="false"
      id="profile-button"
      class="clickable"
      src="#icon-profile"
      position="-0.42 -0.5 0"
      height="0.15"
      width="0.15"
      animation="property: scale; to: 1.2 1.2 1.2; dur: 1000; easing: easeInOutQuad; loop: true; dir: alternate"
    ></a-image>
    <a-image
      visible="false"
      id="web-button"
      class="clickable"
      src="#icon-web"
      alpha-test="0.5"
      position="-0.14 -0.5 0"
      height="0.15"
      width="0.15"
      animation="property: scale; to: 1.2 1.2 1.2; dur: 1000; easing: easeInOutQuad; loop: true; dir: alternate"
    ></a-image>
    <a-image
      visible="false"
      id="email-button"
      class="clickable"
      src="#icon-email"
      position="0.14 -0.5 0"
      height="0.15"
      width="0.15"
      animation="property: scale; to: 1.2 1.2 1.2; dur: 1000; easing: easeInOutQuad; loop: true; dir: alternate"
    ></a-image>
    <a-image
      visible="false"
      id="location-button"
      class="clickable"
      src="#icon-location"
      position="0.42 -0.5 0"
      height="0.15"
      width="0.15"
      animation="property: scale; to: 1.2 1.2 1.2; dur: 1000; easing: easeInOutQuad; loop: true; dir: alternate"
    ></a-image>

    <a-text
      id="text"
      class="clickable"
      value=""
      color="black"
      align="center"
      width="2"
      position="0 -1 0"
      geometry="primitive:plane; height: 0.1; width: 2;"
      material="opacity: 0.5"
    ></a-text>
  </a-entity>
</a-scene>
